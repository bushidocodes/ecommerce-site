name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Least-privilege default: this workflow only checks out and tests the code.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest


    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cookie-monsters_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test:coverage
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/cookie-monsters_test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
